<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Quiz App</title>
<style>
:root{
--pri:#d97757;--pri-l:#e08b6e;--pri-d:#c4623f;--pri-bg:rgba(217,119,87,.08);
--suc:#788c5d;--suc-bg:rgba(120,140,93,.1);
--err:#c0392b;--err-bg:rgba(192,57,43,.08);
--warn:#d4a04a;--warn-bg:rgba(212,160,74,.1);
--bg:#faf9f5;--bg2:#FFFFFF;--bg3:#f4f2eb;
--tx:#141413;--tx2:#5a5750;--tx3:#b0aea5;
--brd:#e8e6dc;--brd2:#d5d2c8;
--sh:0 1px 3px rgba(20,20,19,.06),0 1px 2px rgba(20,20,19,.04);
--sh2:0 4px 6px rgba(20,20,19,.05),0 2px 4px rgba(20,20,19,.04);
--sh3:0 10px 15px rgba(20,20,19,.08),0 4px 6px rgba(20,20,19,.04);
--r:16px;--r2:12px;--r3:24px;
--tab-h:60px;--nav-h:56px;
--safe-b:env(safe-area-inset-bottom,0px);
--accent-blue:#6a9bcc;
}
.dark{
--bg:#141413;--bg2:#1e1e1c;--bg3:#2a2a27;
--tx:#faf9f5;--tx2:#b0aea5;--tx3:#6b6960;
--brd:#2a2a27;--brd2:#3a3a36;
--sh:0 1px 3px rgba(0,0,0,.3);--sh2:0 4px 6px rgba(0,0,0,.3);--sh3:0 10px 15px rgba(0,0,0,.4);
--pri-bg:rgba(217,119,87,.15);--suc-bg:rgba(120,140,93,.15);--err-bg:rgba(192,57,43,.12);--warn-bg:rgba(212,160,74,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:"Styrene A","Söhne",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden;min-height:100vh;
padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);letter-spacing:.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
@media(min-width:768px){body{padding-bottom:0;padding-top:var(--nav-h)}}
a{color:var(--pri);text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit;color:inherit}
.icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;vertical-align:middle;flex-shrink:0}
.icon svg{width:100%;height:100%}
.icon-sm{width:16px;height:16px}
.icon-lg{width:24px;height:24px}
.icon-xl{width:48px;height:48px}

/* Top Nav desktop */
#topnav{display:none;position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:1000;
  background:rgba(250,249,245,.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,.1)}
.dark #topnav{background:rgba(20,20,19,.72);border-bottom-color:rgba(255,255,255,.08)}
@media(min-width:768px){#topnav{display:flex;align-items:center;padding:0 24px}}
#topnav .brand{font-weight:700;font-size:1.1rem;color:var(--pri);margin-right:32px;white-space:nowrap}
#topnav .nav-tabs{display:flex;gap:4px;flex:1}
#topnav .nav-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);color:var(--tx2);font-size:.9rem;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative}
#topnav .nav-tab:hover{color:var(--pri)}
#topnav .nav-tab:focus-visible{outline:2px solid var(--pri);outline-offset:2px;border-radius:var(--r2)}
#topnav .nav-tab.active{color:var(--pri);font-weight:600}
#topnav .nav-tab.active::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2px;background:var(--pri);border-radius:1px}

/* Bottom Tabs mobile - iOS 26 frosted glass style */
#bottomtabs{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-b);display:flex;z-index:1000;transform:translateZ(0);-webkit-transform:translateZ(0);
  background:rgba(250,249,245,.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid rgba(0,0,0,.12)}
.dark #bottomtabs{background:rgba(20,20,19,.72);border-top-color:rgba(255,255,255,.08)}
@media(min-width:768px){#bottomtabs{display:none}}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--tx3);font-size:.6rem;font-weight:500;letter-spacing:.02em;padding:8px 0 6px;transition:color .25s cubic-bezier(.4,0,.2,1);-webkit-tap-highlight-color:transparent;min-height:50px;position:relative;cursor:pointer}
.btab .icon{width:24px;height:24px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.btab.active{color:var(--pri);font-weight:600}
.btab.active .icon{transform:scale(1.12)}

/* Main */
#app{max-width:800px;margin:0 auto;padding:12px}
@media(min-width:768px){#app{padding:20px}}
.view{display:none}
.view.active{display:block}

/* Card */
.card{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:12px;border:1px solid var(--brd);transition:box-shadow .3s cubic-bezier(.4,0,.2,1)}
.card:hover{box-shadow:var(--sh2)}
.card-title{font-size:1rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--r2);font-weight:600;font-size:.9rem;transition:all .3s cubic-bezier(.4,0,.2,1);min-height:44px;min-width:44px}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-d);transform:translateY(-1px);box-shadow:0 2px 8px rgba(217,119,87,.3)}
.btn-suc{background:var(--suc);color:#fff}.btn-suc:hover{opacity:.9;transform:translateY(-1px)}
.btn-err{background:var(--err);color:#fff}.btn-err:hover{opacity:.9;transform:translateY(-1px)}
.btn-warn{background:var(--warn);color:#fff}.btn-warn:hover{opacity:.9;transform:translateY(-1px)}
.btn-out{border:1.5px solid var(--brd2);background:var(--bg2);color:var(--tx)}.btn-out:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.btn-ghost{color:var(--tx2)}.btn-ghost:hover{background:var(--pri-bg);color:var(--pri)}
.btn-sm{padding:6px 12px;font-size:.8rem;min-height:36px}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn:active:not(:disabled){transform:translateY(0)!important;transition-duration:.1s}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);padding:12px;text-align:center}
.stat-val{font-size:1.5rem;font-weight:800;color:var(--pri)}
.stat-val.suc{color:var(--suc)}
.stat-val.err{color:var(--err)}
.stat-label{font-size:.75rem;color:var(--tx2);margin-top:2px}

/* Quick actions */
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.quick-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);min-height:44px;border:1.5px solid var(--brd)}
.quick-btn:hover{border-color:var(--pri);box-shadow:var(--sh2);transform:translateY(-2px)}
.quick-btn:active{transform:translateY(0);transition-duration:.1s}
.quick-btn .icon{width:28px;height:28px;color:var(--pri)}
.quick-btn span{font-size:.85rem;font-weight:600;color:var(--tx)}

/* Mode grid */
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:768px){.mode-grid{grid-template-columns:repeat(3,1fr)}}
.mode-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 8px;background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);border:1.5px solid var(--brd);min-height:44px}
.mode-card:hover{border-color:var(--pri);box-shadow:var(--sh2);transform:translateY(-2px)}
.mode-card:active{transform:translateY(0);transition-duration:.1s}
.mode-card.disabled{opacity:.4;pointer-events:none}
.mode-card .icon{width:28px;height:28px;color:var(--pri)}
.mode-card .mc-label{font-size:.85rem;font-weight:600}
.mode-card .mc-count{font-size:.7rem;color:var(--tx3)}

/* Progress bar */
.prog-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--brd);cursor:pointer;margin-bottom:12px}
.prog-bar .seg{min-width:2px;transition:background .25s cubic-bezier(.4,0,.2,1)}
.seg.correct{background:var(--suc)}
.seg.wrong{background:var(--err)}
.seg.current{background:var(--pri)}
.seg.unanswered{background:var(--brd)}

/* Question header */
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.q-num{font-weight:700;font-size:1rem}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-multi{background:var(--pri-bg);color:var(--pri)}
.badge-single{background:var(--suc-bg);color:var(--suc)}
.badge-diff{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:.7rem;background:var(--bg3)}
.lang-toggle{margin-left:auto;display:flex;gap:0;border-radius:var(--r2);overflow:hidden;border:1px solid var(--brd2)}
.lang-toggle button{padding:4px 10px;font-size:.75rem;font-weight:600;background:var(--bg2);transition:all .25s cubic-bezier(.4,0,.2,1);min-height:32px;min-width:40px}
.lang-toggle button.active{background:var(--pri);color:#fff}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.opt-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:var(--r2);border:1.5px solid var(--brd);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);min-height:44px;-webkit-tap-highlight-color:transparent;user-select:none}
.opt-item:focus{outline:none}
.opt-item:focus-visible{outline:2px solid var(--pri);outline-offset:1px;border-color:var(--pri)}
.opt-item:hover{border-color:var(--pri-l);background:var(--pri-bg)}
.opt-item.selected{border-color:var(--pri);background:var(--pri-bg)}
.opt-item.correct-answer{border-color:var(--suc);background:var(--suc-bg)}
.opt-item.wrong-answer{border-color:var(--err);background:var(--err-bg)}
.opt-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s}
.opt-item.multi .opt-check{border-radius:4px}
.opt-item.selected .opt-check{border-color:var(--pri);background:var(--pri)}
.opt-item.correct-answer .opt-check{border-color:var(--suc);background:var(--suc)}
.opt-item.wrong-answer .opt-check{border-color:var(--err);background:var(--err)}
.opt-check-inner{width:8px;height:8px;border-radius:50%;background:#fff;display:none}
.opt-item.selected .opt-check-inner,
.opt-item.correct-answer .opt-check-inner,
.opt-item.wrong-answer .opt-check-inner{display:block}
.opt-item.multi .opt-check-inner{border-radius:2px}
.opt-key{font-weight:700;color:var(--tx2);min-width:20px}
.opt-text{flex:1;font-size:.95rem}

/* Confidence */
.confidence-row{display:flex;gap:8px;margin:12px 0}
.conf-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:var(--r2);border:1.5px solid var(--brd);font-size:.8rem;font-weight:600;transition:all .25s cubic-bezier(.4,0,.2,1);min-height:44px}
.conf-btn:hover{border-color:var(--tx3)}
.conf-btn.active-sure{border-color:var(--suc);background:var(--suc-bg);color:var(--suc)}
.conf-btn.active-guess{border-color:var(--warn);background:var(--warn-bg);color:var(--warn)}
.conf-btn.active-unsure{border-color:var(--err);background:var(--err-bg);color:var(--err)}

/* Feedback */
.feedback{padding:12px;border-radius:var(--r2);margin:12px 0;font-weight:600;display:flex;align-items:center;gap:8px}
.feedback.correct{background:var(--suc-bg);color:var(--suc)}
.feedback.wrong{background:var(--err-bg);color:var(--err)}
.explanation{margin:8px 0;padding:14px 16px;background:var(--bg3);border-radius:var(--r2);font-size:.9rem;line-height:1.7;white-space:pre-wrap;border-left:3px solid var(--pri);animation:fadeIn .3s cubic-bezier(.4,0,.2,1)}
.expl-toggle{cursor:pointer;display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--pri);font-weight:600;font-size:.9rem}
.notes-area{width:100%;min-height:60px;padding:10px;border:1px solid var(--brd);border-radius:var(--r2);background:var(--bg3);resize:vertical;font-size:.9rem;margin-top:4px}
.notes-section{margin:8px 0}
.notes-toggle{cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 0;color:var(--tx2);font-weight:600;font-size:.85rem}

/* Fixed bottom bar - frosted glass */
.q-bottom{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b));left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;z-index:500;
  background:rgba(250,249,245,.8);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid rgba(0,0,0,.1)}
.dark .q-bottom{background:rgba(20,20,19,.8);border-top-color:rgba(255,255,255,.06)}
@media(min-width:768px){.q-bottom{bottom:0;display:none!important}}

/* Desktop side navigation */
.side-nav-btn{display:none}
@media(min-width:900px){
  .fade-in{position:relative}
  .side-nav-btn{display:flex;align-items:center;justify-content:center;position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--bg2);border:1px solid var(--brd);box-shadow:var(--sh);cursor:pointer;color:var(--tx2);transition:all .2s cubic-bezier(.4,0,.2,1);z-index:100}
  .side-nav-btn:hover{background:var(--pri-bg);color:var(--pri);border-color:var(--pri);transform:translateY(-50%) scale(1.05)}
  .side-nav-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
  .side-nav-prev{left:-52px}
  .side-nav-next{right:-52px}
}

.practice-bottom-spacer{height:70px}
@media(min-width:768px){.practice-bottom-spacer{height:20px}}

/* Desktop bookmark in header */
.bm-head-btn{display:none}
@media(min-width:768px){
  .bm-head-btn{display:inline-flex;align-items:center;padding:4px 6px;border-radius:var(--r2);background:none;border:none;cursor:pointer;transition:color .2s;color:var(--tx3);margin-left:4px}
  .bm-head-btn:hover{color:var(--warn)}
}

/* Exam top */
.exam-top{position:sticky;top:0;padding:10px 16px;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:nowrap;min-height:48px;border-radius:0 0 var(--r2) var(--r2);margin:-12px -12px 12px;
  background:rgba(250,249,245,.8);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,.1)}
.dark .exam-top{background:rgba(20,20,19,.8);border-bottom-color:rgba(255,255,255,.06)}
@media(min-width:768px){.exam-top{margin:-20px -20px 20px;padding:12px 24px;top:var(--nav-h)}}
.timer{display:flex;align-items:center;gap:4px;font-weight:700;font-size:1rem;color:var(--pri);font-variant-numeric:tabular-nums;min-width:80px}
.timer.warning{color:var(--warn)}
.timer.danger{color:var(--err)}
.exam-prog{font-size:.85rem;color:var(--tx2)}
.exam-nav-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:12px;max-height:300px;overflow-y:auto}
.exam-nav-cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--brd);transition:all .2s cubic-bezier(.4,0,.2,1);min-height:30px}
.exam-nav-cell.answered{background:var(--pri-bg);border-color:var(--pri);color:var(--pri)}
.exam-nav-cell.flagged{background:var(--warn-bg);border-color:var(--warn);color:var(--warn)}
.exam-nav-cell.current{background:var(--pri);color:#fff;border-color:var(--pri)}
.exam-nav-cell.wrong-mark{background:var(--err-bg);border-color:var(--err);color:var(--err)}
.exam-bottom{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b));left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;z-index:500;transform:translateZ(0);-webkit-transform:translateZ(0);
  background:rgba(250,249,245,.8);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid rgba(0,0,0,.1)}
.dark .exam-bottom{background:rgba(20,20,19,.8);border-top-color:rgba(255,255,255,.06)}
@media(min-width:768px){.exam-bottom{bottom:0}}

/* Exam result */
.result-score{text-align:center;padding:24px;font-size:3rem;font-weight:900}
.result-pass{color:var(--suc)}
.result-fail{color:var(--err)}
.result-label{font-size:1.2rem;font-weight:700;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.result-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}
.result-stat{text-align:center;padding:12px;background:var(--bg3);border-radius:var(--r2)}
.result-stat .val{font-size:1.3rem;font-weight:700}
.result-stat .lbl{font-size:.75rem;color:var(--tx2)}

/* Wrong filters */
.wrong-filters{display:flex;gap:0;margin-bottom:12px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--brd2)}
.wrong-filter{flex:1;padding:8px;text-align:center;font-size:.85rem;font-weight:600;background:var(--bg2);transition:all .25s cubic-bezier(.4,0,.2,1);cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center}
.wrong-filter.active{background:var(--pri);color:#fff}
.wrong-card{background:var(--bg2);border-radius:var(--r2);padding:12px;margin-bottom:8px;box-shadow:var(--sh);border-left:3px solid var(--err);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.wrong-card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.wrong-card.mastered{border-left-color:var(--suc)}
.wrong-card .wc-id{font-size:.75rem;color:var(--tx3);font-weight:600}
.wrong-card .wc-text{font-size:.9rem;margin:4px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wrong-card .wc-meta{display:flex;gap:12px;font-size:.75rem;color:var(--tx3);margin-top:4px;flex-wrap:wrap}

/* Settings */
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--brd)}
.setting-item:last-child{border-bottom:none}
.setting-label{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:600}
.toggle{position:relative;width:48px;height:26px;background:var(--brd2);border-radius:13px;cursor:pointer;transition:background .3s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.toggle.on{background:var(--pri)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(22px)}
.num-input{width:60px;padding:4px 8px;border:1px solid var(--brd2);border-radius:var(--r2);text-align:center;background:var(--bg3)}

/* Chart */
.chart-wrap{width:100%;height:200px;margin:12px 0}
.chart-wrap canvas{width:100%;height:100%}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,19,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border-radius:var(--r3);padding:24px;max-width:400px;width:100%;box-shadow:var(--sh3);transform:translateY(12px) scale(.97);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal{transform:translateY(0) scale(1)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.modal-body{font-size:.9rem;color:var(--tx2);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

/* Slider */
.slider-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--brd);outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--pri);cursor:pointer;box-shadow:0 1px 4px rgba(217,119,87,.3);transition:transform .2s cubic-bezier(.4,0,.2,1)}
.slider-row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.slider-val{min-width:40px;text-align:center;font-weight:700}

/* Shortcuts */
.shortcut-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(min-width:768px){.shortcut-grid{grid-template-columns:1fr 1fr 1fr}}
.shortcut-item{display:flex;align-items:center;gap:8px;font-size:.8rem;padding:4px 0}
.shortcut-key{background:var(--bg3);border:1px solid var(--brd2);border-radius:4px;padding:2px 8px;font-weight:700;font-family:monospace;font-size:.75rem}

/* Keyboard flash feedback */
@keyframes kb-pulse{0%{transform:scale(1)}45%{transform:scale(1.04);filter:brightness(1.06)}100%{transform:scale(1);filter:brightness(1)}}
.kb-flash{animation:kb-pulse .22s cubic-bezier(.4,0,.2,1)}
/* Focus-visible for interactive div elements */
.btab:focus-visible{outline:2px solid var(--pri);outline-offset:-3px;border-radius:var(--r2)}
.quick-btn:focus-visible,.mode-card:focus-visible,.setup-card:focus-visible,.bm-card:focus-visible{outline:2px solid var(--pri);outline-offset:1px}
.expl-toggle:focus-visible,.notes-toggle:focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:4px}

/* Bookmark */
.bm-card{background:var(--bg2);border-radius:var(--r2);padding:12px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);border-left:3px solid var(--warn)}
.bm-card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}

/* Exam history */
.eh-card{padding:12px;border-bottom:1px solid var(--brd)}
.eh-card:last-child{border-bottom:none}
.eh-row{display:flex;justify-content:space-between;align-items:center}
.eh-score{font-weight:700;font-size:1.1rem}
.eh-date{font-size:.75rem;color:var(--tx3)}
.eh-detail{font-size:.8rem;color:var(--tx2)}

/* Nav panel */
.nav-panel{display:none;background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh2);margin-bottom:12px;overflow:hidden}
.nav-panel.show{display:block}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty-state .icon{width:48px;height:48px;margin-bottom:12px;color:var(--tx3)}
.empty-state p{font-size:.9rem}

/* Profile sections */
.profile-section{margin-bottom:16px}
.profile-section-title{font-size:.85rem;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

/* Setup cards */
.setup-card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh);cursor:pointer;border:1.5px solid var(--brd);transition:all .3s cubic-bezier(.4,0,.2,1)}
.setup-card:hover{border-color:var(--pri);box-shadow:var(--sh2);transform:translateY(-2px)}
.setup-card:active{transform:translateY(0);transition-duration:.1s}
.setup-card.highlight{border-color:var(--warn);background:var(--warn-bg)}
.setup-card h3{font-size:1rem;display:flex;align-items:center;gap:8px}
.setup-card p{font-size:.85rem;color:var(--tx2);margin-top:4px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:6px;font-size:.65rem;font-weight:700}
.tag-easy{background:var(--suc-bg);color:var(--suc)}
.tag-med{background:var(--warn-bg);color:var(--warn)}
.tag-hard{background:var(--err-bg);color:var(--err)}

/* Library picker */
#libPicker{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#libPicker h1{font-size:1.5rem;font-weight:800;margin-bottom:4px;color:var(--pri)}
#libPicker .subtitle{font-size:.9rem;color:var(--tx2);margin-bottom:24px}
.drop-zone{width:100%;max-width:400px;border:2px dashed var(--brd2);border-radius:var(--r3);padding:40px 24px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;background:var(--bg2)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--pri);background:var(--pri-bg)}
.drop-zone .icon{width:48px;height:48px;color:var(--tx3);margin-bottom:12px}
.drop-zone p{font-size:.9rem;color:var(--tx2);margin-bottom:4px}
.drop-zone .hint{font-size:.75rem;color:var(--tx3)}
.lib-history{width:100%;max-width:400px;margin-top:20px;text-align:left}
.lib-history-title{font-size:.8rem;font-weight:700;color:var(--tx3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.lib-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.lib-item:hover{border-color:var(--pri);background:var(--pri-bg);transform:translateY(-1px);box-shadow:var(--sh2)}
.lib-item:active{transform:translateY(0)}
.lib-item-name{font-weight:700;font-size:.95rem}
.lib-item-info{font-size:.75rem;color:var(--tx3)}
.lib-item-right{display:flex;align-items:center;gap:8px}
.lib-item-remove{color:var(--tx3);padding:4px;border-radius:4px;transition:color .2s}
.lib-item-remove:hover{color:var(--err)}
.lib-or{font-size:.8rem;color:var(--tx3);margin:16px 0}

/* Hidden utility */
.hidden{display:none!important}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .4s cubic-bezier(.4,0,.2,1)}

/* Review question */
.review-q{padding:12px;border-bottom:1px solid var(--brd)}
.review-q:last-child{border-bottom:none}
.review-q .rq-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.review-q .rq-stem{font-size:.9rem;margin:4px 0;line-height:1.5}
.review-q .rq-ans{font-size:.8rem;color:var(--tx2)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}

/* Selection */
::selection{background:rgba(217,119,87,.2);color:var(--tx)}
</style>

function shuffle(a){let c=[...a];for(let i=c.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;}
function vibrate(ms){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
function fmtTime(s){let m=Math.floor(s/60),sec=Math.floor(s%60);return m+'m '+sec+'s';}
function fmtTimer(ms){let tot=Math.max(0,Math.ceil(ms/1000));let m=Math.floor(tot/60),s=tot%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function pct(n,d){return d?Math.round(n/d*100):0;}
function arrEq(a,b){if(a.length!==b.length)return false;let sa=[...a].sort(),sb=[...b].sort();return sa.every((v,i)=>v===sb[i]);}

/* ============================================================
   State Management
   ============================================================ */
function defaultState(){
  return {
    version:1,
    answers:{},
    wrongIds:[],
    masteredWrongIds:[],
    bookmarkIds:[],
    notes:{},
    examHistory:[],
    pausedExam:null,
    settings:{lang:'en',showExplanation:true,darkMode:false,wrongMasteryThreshold:2,shuffleOptions:false},
    reviewSchedule:{}
  };
}

function loadState(){
  try{
    let raw=localStorage.getItem(LS_KEY);
    if(raw){ST=JSON.parse(raw);if(!ST.version)ST=defaultState();}
    else ST=defaultState();
  }catch(e){ST=defaultState();}
  if(!ST.reviewSchedule)ST.reviewSchedule={};
  if(!ST.notes)ST.notes={};
  if(!ST.settings)ST.settings={lang:'en',showExplanation:true,darkMode:false,wrongMasteryThreshold:2,shuffleOptions:false};
  if(ST.settings.shuffleOptions===undefined)ST.settings.shuffleOptions=false;
  applyDarkMode();
}

function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(ST));}catch(e){}
}

function applyDarkMode(){
  let dark=false;
  if(ST&&ST.settings&&ST.settings.darkMode===true)dark=true;
  else if(ST&&ST.settings&&ST.settings.darkMode===false)dark=false;
  else if(window.matchMedia)dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.classList.toggle('dark',dark);
}

/* ============================================================
   Question Helpers
   ============================================================ */
function getQ(id){return Q.find(q=>q.id===id);}
function getLang(){return ST.settings.lang||'en';}
function qText(q){return getLang()==='ja'?(q.questionJa||q.question):q.question;}
function oText(o){return getLang()==='ja'?(o.textJa||o.text):o.text;}

function getDifficulty(q){
  if(q.isMultiple&&q.answer.length>=3)return 'hard';
  if(q.isMultiple)return 'medium';
  if(q.options&&q.options.length>=5)return 'medium';
  return 'easy';
}

function diffTag(q){
  let d=getDifficulty(q);
  if(d==='easy')return '<span class="tag tag-easy">'+ic('dotG','icon-sm')+' Easy</span>';
  if(d==='medium')return '<span class="tag tag-med">'+ic('dotY','icon-sm')+' Med</span>';
  return '<span class="tag tag-hard">'+ic('dotR','icon-sm')+' Hard</span>';
}

function typeBadge(q){
  return q.isMultiple
    ?'<span class="badge badge-multi">\u591A\u9009 ('+q.answer.length+')</span>'
    :'<span class="badge badge-single">\u5355\u9009</span>';
}

/* ============================================================
   Statistics
   ============================================================ */
function getStats(){
  let answered=0,correct=0,wrong=0,totalTime=0;
  for(let id in ST.answers){
    let a=ST.answers[id];answered++;
    if(a.correct)correct++;else wrong++;
    totalTime+=(a.timeSpent||0);
  }
  return {answered,correct,wrong,totalTime,accuracy:pct(correct,answered)};
}

function getTodayReviewCount(){
  let t=today(),c=0;
  for(let id in ST.reviewSchedule){
    if(ST.reviewSchedule[id].nextReview&&ST.reviewSchedule[id].nextReview<=t)c++;
  }
  return c;
}

function getTodayReviewIds(){
  let t=today(),ids=[];
  for(let id in ST.reviewSchedule){
    if(ST.reviewSchedule[id].nextReview&&ST.reviewSchedule[id].nextReview<=t)ids.push(id);
  }
  return ids;
}

function updateReviewSchedule(id,wasCorrect){
  if(!ST.reviewSchedule[id])ST.reviewSchedule[id]={nextReview:null,interval:1,level:0};
  let r=ST.reviewSchedule[id];
  if(wasCorrect){
    r.level=Math.min(r.level+1,REVIEW_INTERVALS.length-1);
    let days=REVIEW_INTERVALS[r.level]||30;
    let d=new Date();d.setDate(d.getDate()+days);
    r.nextReview=d.toISOString().slice(0,10);
    r.interval=days;
  }else{
    r.level=0;
    let d=new Date();d.setDate(d.getDate()+REVIEW_INTERVALS[0]);
    r.nextReview=d.toISOString().slice(0,10);
    r.interval=REVIEW_INTERVALS[0];
  }
}

/* ============================================================
   Tab Navigation
   ============================================================ */
const TABS=[
  {id:'dash',label:'\u4eea\u8868\u76d8',icon:'home'},
  {id:'practice',label:'\u7ec3\u4e60',icon:'book'},
  {id:'exam',label:'\u8003\u8bd5',icon:'trophy'},
  {id:'wrong',label:'\u9519\u9898',icon:'xCircle'},
  {id:'profile',label:'\u6211\u7684',icon:'user'}
];

function renderTabs(){
  let btm='',top='';
  TABS.forEach(t=>{
    let a=t.id===curTab?' active':'';
    btm+='<div class="btab'+a+'" data-navtab="'+t.id+'" tabindex="0">'+ic(t.icon)+'<span>'+t.label+'</span></div>';
    top+='<button class="nav-tab'+a+'" data-navtab="'+t.id+'">'+ic(t.icon)+' '+t.label+'</button>';
  });
  $('#bottomtabs').innerHTML=btm;
  $('#desktopTabs').innerHTML=top;
}

// Event delegation on tabs - set up ONCE, never lost
document.addEventListener('click',function(e){
  let el=e.target.closest('[data-navtab]');
  if(el){
    e.preventDefault();
    e.stopPropagation();
    switchTab(el.dataset.navtab);
  }
},true);

function switchTab(id){
  if(examActive&&id!=='exam'){
    if(!confirm('\u79bb\u5f00\u5c06\u6682\u505c\u8003\u8bd5\uff0c\u786e\u5b9a\u7ee7\u7eed\uff1f'))return;
    pauseExam();
  }
  curTab=id;
  $$('.view').forEach(function(v){v.classList.remove('active');});
  let v=$('#v-'+id);if(v)v.classList.add('active');
  // Hide all fixed bottom bars, then let renderView show the right one
  $('#practiceBar').style.display='none';
  $('#examBar').style.display='none';
  renderTabs();
  renderView(id);
}

function renderView(id){
  if(id==='dash')renderDash();
  else if(id==='practice')renderPractice();
  else if(id==='exam')renderExam();
  else if(id==='wrong')renderWrong();
  else if(id==='profile')renderProfile();
}

function renderPractice(){
  if(practiceMode){renderPracticeQuestion();return;}
  let wrongCount=ST.wrongIds.filter(function(id){return !ST.masteredWrongIds.includes(id);}).length;
  let unanswered=Q.filter(function(q){return !ST.answers[q.id];}).length;
  let bmCount=ST.bookmarkIds.length;
  let rc=getTodayReviewCount();

  let html='<div class="fade-in">';
  html+='<h2 style="margin-bottom:12px;display:flex;align-items:center;gap:8px">'+ic('book','icon-lg')+' \u7ec3\u4e60\u6a21\u5f0f</h2>';
  html+='<div class="mode-grid">';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'seq\')">'+ic('book')+'<div class="mc-label">\u987a\u5e8f</div><div class="mc-count">'+Q.length+' \u9898</div></div>';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'random\')">'+ic('dice')+'<div class="mc-label">\u968f\u673a</div><div class="mc-count">'+Q.length+' \u9898</div></div>';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'wrong\')">'+ic('xCircle')+'<div class="mc-label">\u9519\u9898</div><div class="mc-count">'+wrongCount+' \u9898</div></div>';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'unanswered\')">'+ic('helpCircle')+'<div class="mc-label">\u672a\u505a</div><div class="mc-count">'+unanswered+' \u9898</div></div>';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'bookmark\')">'+ic('star')+'<div class="mc-label">\u6536\u85cf</div><div class="mc-count">'+bmCount+' \u9898</div></div>';
  html+='<div class="mode-card" tabindex="0" onclick="startPractice(\'review\')">'+ic('calendar')+'<div class="mc-label">\u4eca\u65e5\u590d\u4e60</div><div class="mc-count">'+rc+' \u9898</div></div>';
  html+='</div></div>';
  $('#v-practice').innerHTML=html;
}

function startPractice(mode){
  practiceMode=mode;
  practiceIdx=0;
  resetQState();

  if(mode==='seq'){
    practiceQs=Q.map(function(q){return q.id;});
    // Resume to first unanswered
    for(let i=0;i<practiceQs.length;i++){
      if(!ST.answers[practiceQs[i]]){practiceIdx=i;break;}
    }
  }else if(mode==='random'){
    practiceQs=shuffle(Q.map(function(q){return q.id;}));
  }else if(mode==='wrong'){
    practiceQs=ST.wrongIds.filter(function(id){return !ST.masteredWrongIds.includes(id);});
    if(!practiceQs.length){alert('\u6ca1\u6709\u9519\u9898!');practiceMode=null;renderPractice();return;}
  }else if(mode==='unanswered'){
    practiceQs=Q.filter(function(q){return !ST.answers[q.id];}).map(function(q){return q.id;});
    if(!practiceQs.length){alert('\u6240\u6709\u9898\u76ee\u5df2\u7b54!');practiceMode=null;renderPractice();return;}
  }else if(mode==='bookmark'){
    practiceQs=[...ST.bookmarkIds];
    if(!practiceQs.length){alert('\u6ca1\u6709\u6536\u85cf\u9898\u76ee!');practiceMode=null;renderPractice();return;}
  }else if(mode==='review'){
    practiceQs=getTodayReviewIds();
    if(!practiceQs.length){alert('\u4eca\u65e5\u6ca1\u6709\u5f85\u590d\u4e60\u7684\u9898\u76ee!');practiceMode=null;renderPractice();return;}
  }

  practiceTimeStart=Date.now();
  if(curTab!=='practice')switchTab('practice');
  else renderPracticeQuestion();
}

function startReview(){startPractice('review');}

function exitPractice(){
  practiceMode=null;practiceQs=[];
  $('#practiceBar').style.display='none';
  renderPractice();
  window.scrollTo(0,0);
}

function resetQState(){
  practiceSubmitted=false;practiceSelected=[];practiceConfidence='none';
  practiceShowExpl=false;practiceShowNotes=false;
}

function renderPracticeQuestion(autoFocus){
  if(!practiceQs.length){
    $('#v-practice').innerHTML='<div class="empty-state">'+ic('helpCircle','icon-xl')+'<p>\u6ca1\u6709\u53ef\u7528\u9898\u76ee</p><button class="btn btn-pri" onclick="exitPractice()">\u8fd4\u56de</button></div>';
    return;
  }
  if(practiceIdx<0)practiceIdx=0;
  if(practiceIdx>=practiceQs.length)practiceIdx=practiceQs.length-1;
  let qId=practiceQs[practiceIdx];
  let q=getQ(qId);
  if(!q){exitPractice();return;}
  let lang=getLang();
  let isBm=ST.bookmarkIds.includes(qId);

  let html='<div class="fade-in">';

  // Desktop side navigation buttons
  html+='<button class="side-nav-btn side-nav-prev" onclick="prevQ()"'+(practiceIdx<=0?' disabled':'')+'>'+ic('chevronL')+'</button>';
  html+='<button class="side-nav-btn side-nav-next" onclick="nextQ()"'+(practiceIdx>=practiceQs.length-1?' disabled':'')+'>'+ic('chevronR')+'</button>';

  // Back + counter
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
  html+='<button class="btn btn-ghost btn-sm" onclick="exitPractice()">'+ic('chevronL')+' \u8fd4\u56de</button>';
  html+='<button class="btn btn-ghost btn-sm" onclick="jumpToQuestion()" style="font-variant-numeric:tabular-nums">'+(practiceIdx+1)+' / '+practiceQs.length+' '+ic('list','icon-sm')+'</button>';
  html+='</div>';

  // Progress bar
  html+='<div class="prog-bar">';
  for(let i=0;i<Math.min(practiceQs.length,200);i++){
    let cls='unanswered';
    if(i===practiceIdx)cls='current';
    else{let a=ST.answers[practiceQs[i]];if(a)cls=a.correct?'correct':'wrong';}
    html+='<div class="seg '+cls+'" style="flex:1" onclick="jumpPractice('+i+')"></div>';
  }
  html+='</div>';

  // Question header
  html+='<div class="q-head">';
  html+='<span class="q-num">'+h(q.id)+'</span>';
  html+=typeBadge(q);
  html+=diffTag(q);
  html+='<div class="lang-toggle">';
  html+='<button class="'+(lang==='en'?'active':'')+'" onclick="setLang(\'en\')">EN</button>';
  html+='<button class="'+(lang==='ja'?'active':'')+'" onclick="setLang(\'ja\')">JA</button>';
  html+='</div>';
  html+='<button class="bm-head-btn" onclick="toggleBookmark(\''+qId+'\')" style="color:'+(isBm?'var(--warn)':'')+'">'+ic(isBm?'starFill':'star','icon-lg')+'</button>';
  html+='</div>';

  // Question text
  html+='<div style="font-size:1rem;line-height:1.7;margin:8px 0">'+h(qText(q))+'</div>';

  // Options
  html+='<div class="options-list">';
  let opts=q.options.slice();
  if(ST.settings.shuffleOptions)opts=shuffle(opts);
  opts.forEach(function(o){
    let sel=practiceSelected.includes(o.key);
    let multi=q.isMultiple;
    let cls='opt-item'+(multi?' multi':'')+(sel?' selected':'');
    if(practiceSubmitted){
      let isCorrectKey=q.answer.includes(o.key);
      if(isCorrectKey)cls+=' correct-answer';
      else if(sel&&!isCorrectKey)cls+=' wrong-answer';
    }
    html+='<div class="'+cls+'" data-key="'+o.key+'" tabindex="0" onclick="toggleOption(\''+o.key+'\')">';
    html+='<div class="opt-check"><div class="opt-check-inner"></div></div>';
    html+='<span class="opt-key">'+o.key+'.</span>';
    html+='<span class="opt-text">'+h(oText(o))+'</span>';
    html+='</div>';
  });
  html+='</div>';

  // Confidence + submit
  if(!practiceSubmitted){
    html+='<div class="confidence-row">';
    html+='<button class="conf-btn'+(practiceConfidence==='sure'?' active-sure':'')+'" onclick="setConfidence(\'sure\')">'+ic('checkCircle','icon-sm')+' \u786e\u5b9a</button>';
    html+='<button class="conf-btn'+(practiceConfidence==='guess'?' active-guess':'')+'" onclick="setConfidence(\'guess\')">'+ic('helpCircle','icon-sm')+' \u731c\u6d4b</button>';
    html+='<button class="conf-btn'+(practiceConfidence==='unsure'?' active-unsure':'')+'" onclick="setConfidence(\'unsure\')">'+ic('target','icon-sm')+' \u4e0d\u786e\u5b9a</button>';
    html+='</div>';
    html+='<button class="btn btn-pri btn-block submit-btn" onclick="submitAnswer()"'+(practiceSelected.length?'':' disabled')+'>\u63d0\u4ea4\u7b54\u6848</button>';
  }

  // Feedback
  if(practiceSubmitted){
    let isCorrect=arrEq(practiceSelected,q.answer);
    html+='<div class="feedback '+(isCorrect?'correct':'wrong')+'">';
    html+=ic(isCorrect?'checkCircle':'xCircle');
    html+=' '+(isCorrect?'\u56de\u7b54\u6b63\u786e!':'\u56de\u7b54\u9519\u8bef! \u6b63\u786e\u7b54\u6848: '+q.answer.join(', '));
    html+='</div>';

    // Explanation toggle
    html+='<div class="expl-toggle" tabindex="0" onclick="toggleExpl()">'+ic(practiceShowExpl?'chevronL':'chevronR','icon-sm')+' '+(practiceShowExpl?'\u9690\u85cf':'\u663e\u793a')+'\u89e3\u6790</div>';
    if(practiceShowExpl&&q.explanation){
      html+='<div class="explanation">'+h(q.explanation)+'</div>';
    }
  }

  // Notes
  html+='<div class="notes-section">';
  html+='<div class="notes-toggle" tabindex="0" onclick="toggleNotes()">'+ic('edit','icon-sm')+' '+(practiceShowNotes?'\u9690\u85cf':'\u663e\u793a')+'\u7b14\u8bb0</div>';
  if(practiceShowNotes){
    let noteVal=ST.notes[qId]||'';
    html+='<textarea class="notes-area" id="noteArea" placeholder="\u5728\u6b64\u8f93\u5165\u7b14\u8bb0..." onblur="saveNote(\''+qId+'\')">'+h(noteVal)+'</textarea>';
  }
  html+='</div>';

  html+='<div class="practice-bottom-spacer"></div></div>';

  $('#v-practice').innerHTML=html;

  // Auto-focus management after state transitions
  if(autoFocus){
    if(practiceSubmitted){
      let fb=$('#v-practice .feedback');
      if(fb){fb.tabIndex=-1;fb.focus();}
    }else{
      let first=$('#v-practice .opt-item');
      if(first)first.focus();
    }
  }

  // Render bottom bar into external container
  let bar='<button class="btn btn-ghost" onclick="prevQ()"'+(practiceIdx<=0?' disabled':'')+'>'+ic('chevronL')+' \u4e0a\u4e00\u9898</button>';
  bar+='<button class="btn btn-ghost bm-bar-btn" onclick="toggleBookmark(\''+qId+'\')" style="color:'+(isBm?'var(--warn)':'var(--tx3)')+'">'+ic(isBm?'starFill':'star','icon-lg')+'</button>';
  bar+='<button class="btn btn-ghost" onclick="nextQ()"'+(practiceIdx>=practiceQs.length-1?' disabled':'')+'>\u4e0b\u4e00\u9898 '+ic('chevronR')+'</button>';
  $('#practiceBar').innerHTML=bar;
  $('#practiceBar').style.display='flex';
}

function toggleOption(key){
  if(practiceSubmitted)return;
  let q=getQ(practiceQs[practiceIdx]);
  if(!q)return;
  if(q.isMultiple){
    let i=practiceSelected.indexOf(key);
    if(i>=0)practiceSelected.splice(i,1);else practiceSelected.push(key);
  }else{
    practiceSelected=[key];
  }
  // 直接更新 DOM，不全量重渲染
  let container=$('#v-practice');
  if(!container)return;
  container.querySelectorAll('.opt-item').forEach(function(el){
    let k=el.dataset.key;
    el.classList.toggle('selected',practiceSelected.includes(k));
  });
  let submitBtn=container.querySelector('.submit-btn');
  if(submitBtn)submitBtn.disabled=!practiceSelected.length;
}

function setConfidence(c){practiceConfidence=c;renderPracticeQuestion();}

function setLang(l){
  ST.settings.lang=l;saveState();
  if(practiceMode)renderPracticeQuestion();
  else if(examActive)renderExamActive();
}

function submitAnswer(){
  if(!practiceSelected.length)return;
  let qId=practiceQs[practiceIdx];
  let q=getQ(qId);
  if(!q)return;
  let isCorrect=arrEq(practiceSelected,q.answer);
  let timeSpent=Math.round((Date.now()-practiceTimeStart)/1000);
  practiceSubmitted=true;

  let prev=ST.answers[qId];
  let attempts=(prev?prev.attempts:0)+1;
  let correctStreak=isCorrect?(prev?(prev.correctStreak||0)+1:1):0;

  ST.answers[qId]={
    selected:[...practiceSelected],correct:isCorrect,time:isoNow(),
    timeSpent:timeSpent,attempts:attempts,correctStreak:correctStreak,
    confidence:practiceConfidence
  };

  // Wrong tracking
  if(!isCorrect){
    if(!ST.wrongIds.includes(qId))ST.wrongIds.push(qId);
    let mi=ST.masteredWrongIds.indexOf(qId);
    if(mi>=0)ST.masteredWrongIds.splice(mi,1);
  }else{
    let thresh=ST.settings.wrongMasteryThreshold||2;
    if(thresh>0&&correctStreak>=thresh&&ST.wrongIds.includes(qId)){
      if(!ST.masteredWrongIds.includes(qId))ST.masteredWrongIds.push(qId);
    }
  }

  updateReviewSchedule(qId,isCorrect);
  saveState();
  vibrate(isCorrect?[50]:[100,50,100]);
  practiceShowExpl=true;
  renderPracticeQuestion(true);
}

function prevQ(){
  if(practiceIdx>0){practiceIdx--;resetQState();practiceTimeStart=Date.now();renderPracticeQuestion(true);}
}
function nextQ(){
  if(practiceIdx<practiceQs.length-1){practiceIdx++;resetQState();practiceTimeStart=Date.now();renderPracticeQuestion(true);}
}
function jumpPractice(i){
  practiceIdx=i;resetQState();practiceTimeStart=Date.now();renderPracticeQuestion();
}

function jumpToQuestion(){
  let total=practiceQs.length;
  let correct=0,wrong=0,unanswered=0;
  let grid='';
  for(let i=0;i<total;i++){
    let a=ST.answers[practiceQs[i]];
    let cls='';
    if(i===practiceIdx)cls='current';
    else if(a&&a.correct){cls='answered';correct++;}
    else if(a&&!a.correct){cls='wrong-mark';wrong++;}
    else unanswered++;
    grid+='<div class="exam-nav-cell '+cls+'" onclick="jumpPractice('+i+');hideModal()">'+(i+1)+'</div>';
  }
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html+='<div style="font-weight:700;font-size:1rem">\u9898\u76ee\u5bfc\u822a</div>';
  html+='<button class="btn btn-ghost btn-sm" onclick="hideModal()">'+ic('xCircle','icon-sm')+'</button></div>';
  html+='<div style="display:flex;gap:12px;margin-bottom:12px;font-size:.75rem;color:var(--tx2);flex-wrap:wrap">';
  html+='<span>'+ic('checkCircle','icon-sm')+' \u6b63\u786e '+correct+'</span>';
  html+='<span>'+ic('xCircle','icon-sm')+' \u9519\u8bef '+wrong+'</span>';
  html+='<span style="color:var(--tx3)">\u672a\u505a '+unanswered+'</span></div>';
  html+='<div class="exam-nav-grid" style="max-height:50vh;overflow-y:auto">'+grid+'</div>';
  showModalRaw(html);
}

function toggleExpl(){
  practiceShowExpl=!practiceShowExpl;
  let container=$('#v-practice');if(!container)return;
  let toggle=container.querySelector('.expl-toggle');
  if(toggle){
    toggle.innerHTML=ic(practiceShowExpl?'chevronL':'chevronR','icon-sm')+' '+(practiceShowExpl?'\u9690\u85cf':'\u663e\u793a')+'\u89e3\u6790';
    let existing=container.querySelector('.explanation');
    if(practiceShowExpl&&!existing){
      let q=getQ(practiceQs[practiceIdx]);
      if(q&&q.explanation){
        let div=document.createElement('div');
        div.className='explanation';
        div.style.animation='fadeIn .3s cubic-bezier(.4,0,.2,1)';
        div.textContent=q.explanation;
        toggle.after(div);
      }
    }else if(!practiceShowExpl&&existing){
      existing.remove();
    }
  }
}

function toggleNotes(){
  practiceShowNotes=!practiceShowNotes;
  let container=$('#v-practice');if(!container)return;
  let toggle=container.querySelector('.notes-toggle');
  if(toggle){
    toggle.innerHTML=ic('edit','icon-sm')+' '+(practiceShowNotes?'\u9690\u85cf':'\u663e\u793a')+'\u7b14\u8bb0';
    let existing=container.querySelector('.notes-area');
    if(practiceShowNotes&&!existing){
      let qId=practiceQs[practiceIdx];
      let ta=document.createElement('textarea');
      ta.className='notes-area';ta.id='noteArea';
      ta.placeholder='\u5728\u6b64\u8f93\u5165\u7b14\u8bb0...';
      ta.value=ST.notes[qId]||'';
      ta.onblur=function(){saveNote(qId);};
      toggle.after(ta);
      ta.focus();
    }else if(!practiceShowNotes&&existing){
      existing.remove();
    }
  }
}

function saveNote(id){
  let el=$('#noteArea');if(el){ST.notes[id]=el.value;saveState();}
}

function toggleBookmark(id){
  let i=ST.bookmarkIds.indexOf(id);
  if(i>=0)ST.bookmarkIds.splice(i,1);else ST.bookmarkIds.push(id);
  saveState();
  let isBm=ST.bookmarkIds.includes(id);
  if(practiceMode){
    let headBtn=$('.bm-head-btn');
    if(headBtn){
      headBtn.innerHTML=ic(isBm?'starFill':'star','icon-lg');
      headBtn.style.color=isBm?'var(--warn)':'';
    }
    let barBm=$('.bm-bar-btn');
    if(barBm){
      barBm.innerHTML=ic(isBm?'starFill':'star','icon-lg');
      barBm.style.color=isBm?'var(--warn)':'var(--tx3)';

}

/* ============================================================
   3. Exam
   ============================================================ */
function renderExam(){
  if(examActive){renderExamActive();return;}
  if(examReview){renderExamResult();return;}
  renderExamSetup();
}

function renderExamSetup(){

function startExam(mode){
  let count=EXAM_CFG.officialCount,time=EXAM_CFG.officialTime;
  if(mode==='custom'){
    let ce=document.getElementById('examCount');
    let te=document.getElementById('examTime');
    if(ce)count=parseInt(ce.value)||EXAM_CFG.officialCount;
    if(te)time=parseInt(te.value)||EXAM_CFG.officialTime;
  }
  let ids=shuffle(Q.map(function(q){return q.id;})).slice(0,count);
  examState={
    mode:mode,questionIds:ids,currentIndex:0,
    answers:{},flagged:new Set(),
    remainingMs:time*60*1000,total:count,
    startTime:Date.now()
  };
  examActive=true;
  examShowNav=false;
  startExamTimer();
  renderExamActive();
}

function resumeExam(){
  if(!ST.pausedExam)return;
  let p=ST.pausedExam;
  examState={
    mode:p.mode,questionIds:p.questionIds,currentIndex:p.currentIndex,
    answers:p.answers||{},flagged:new Set(p.flagged||[]),
    remainingMs:p.remainingMs,total:p.total,
    startTime:Date.now()
  };
  ST.pausedExam=null;saveState();
  examActive=true;examShowNav=false;
  startExamTimer();
  renderExamActive();
}

function startExamTimer(){
  if(examTimerInterval)clearInterval(examTimerInterval);
  let lastTick=Date.now();
  examTimerInterval=setInterval(function(){
    let now=Date.now();
    examState.remainingMs-=(now-lastTick);
    lastTick=now;
    if(examState.remainingMs<=0){
      examState.remainingMs=0;
      clearInterval(examTimerInterval);
      finishExam();
      return;
    }
    let timerEl=document.getElementById('examTimer');
    if(timerEl){
      timerEl.innerHTML=ic('clock','icon-sm')+' '+fmtTimer(examState.remainingMs);
      timerEl.className='timer'+(examState.remainingMs<60000?' danger':examState.remainingMs<300000?' warning':'');
    }
  },1000);
}

function pauseExam(){
  if(!examActive)return;
  clearInterval(examTimerInterval);
  ST.pausedExam={
    mode:examState.mode,questionIds:examState.questionIds,
    currentIndex:examState.currentIndex,answers:examState.answers,
    flagged:[...examState.flagged],remainingMs:examState.remainingMs,
    total:examState.total,answered:Object.keys(examState.answers).length
  };
  saveState();
  examActive=false;examState=null;
  $('#examBar').style.display='none';
  renderExam();
}

function finishExam(){
  clearInterval(examTimerInterval);
  let score=0;
  let now=isoNow();
  examState.questionIds.forEach(function(id){
    let a=examState.answers[id]||[];
    let q=getQ(id);
    if(!q)return;
    let correct=arrEq(a,q.answer);
    if(correct)score++;

    // Update per-question answer state
    let prev=ST.answers[id];
    let attempts=prev?prev.attempts+1:1;
    let streak=correct?(prev?prev.correctStreak+1:1):0;
    ST.answers[id]={
      selected:a,correct:correct,time:now,
      timeSpent:prev?prev.timeSpent||0:0,
      attempts:attempts,correctStreak:streak,
      confidence:prev?prev.confidence||'none':'none'
    };

    // Update wrong list
    if(!correct){
      if(!ST.wrongIds.includes(id))ST.wrongIds.push(id);
      ST.masteredWrongIds=ST.masteredWrongIds.filter(function(x){return x!==id;});
      updateReviewSchedule(id,false);
    }else{
      updateReviewSchedule(id,true);
      let threshold=ST.settings.wrongMasteryThreshold;
      if(threshold>0&&streak>=threshold&&ST.wrongIds.includes(id)){
        if(!ST.masteredWrongIds.includes(id))ST.masteredWrongIds.push(id);
      }
    }
  });
  let result={
    date:now,mode:examState.mode,score:score,total:examState.total,
    timeUsed:Math.round((Date.now()-examState.startTime)/1000),
    details:{answers:JSON.parse(JSON.stringify(examState.answers)),questionIds:[...examState.questionIds]}
  };
  ST.examHistory.push(result);
  ST.pausedExam=null;
  saveState();
  examReview=result;
  examActive=false;examState=null;
  $('#examBar').style.display='none';
  renderExamResult();
}

function renderExamActive(){
  if(!examState)return;
  let qId=examState.questionIds[examState.currentIndex];
  let q=getQ(qId);
  if(!q)return;
  let sel=examState.answers[qId]||[];
  let isFlagged=examState.flagged.has(qId);
  let answeredCount=Object.keys(examState.answers).length;
  let lang=getLang();

  let html='';
  // Sticky top bar
  html+='<div class="exam-top">';
  html+='<div class="timer" id="examTimer">'+ic('clock','icon-sm')+' '+fmtTimer(examState.remainingMs)+'</div>';
  html+='<button class="btn btn-ghost btn-sm" onclick="pauseExam()">'+ic('pause','icon-sm')+' \u6682\u505c</button>';
  html+='<div class="exam-prog">'+answeredCount+'/'+examState.total+'</div>';
  html+='<button class="btn btn-ghost btn-sm" onclick="toggleExamNav()">'+ic('clipboard','icon-sm')+' \u5bfc\u822a</button>';
  html+='<div style="margin-left:auto"><button class="btn btn-err btn-sm" onclick="confirmFinish()">\u63d0\u4ea4\u8003\u8bd5</button></div>';
  html+='</div>';

  // Nav grid panel
  html+='<div class="nav-panel'+(examShowNav?' show':'')+'">';
  html+='<div class="exam-nav-grid">';
  examState.questionIds.forEach(function(id,i){
    let cls='exam-nav-cell';
    if(i===examState.currentIndex)cls+=' current';
    else if(examState.flagged.has(id))cls+=' flagged';
    else if(examState.answers[id])cls+=' answered';
    html+='<div class="'+cls+'" onclick="jumpExam('+i+')">'+(i+1)+'</div>';
  });
  html+='</div></div>';

  // Question
  html+='<div class="q-head">';
  html+='<span class="q-num">'+(examState.currentIndex+1)+'. '+h(q.id)+'</span>';
  html+=typeBadge(q);
  html+=diffTag(q);
  html+='<div class="lang-toggle">';
  html+='<button class="'+(lang==='en'?'active':'')+'" onclick="setLang(\'en\')">EN</button>';
  html+='<button class="'+(lang==='ja'?'active':'')+'" onclick="setLang(\'ja\')">JA</button>';
  html+='</div></div>';

  html+='<div style="font-size:1rem;line-height:1.7;margin:8px 0">'+h(qText(q))+'</div>';

  html+='<div class="options-list">';
  let exOpts=q.options.slice();
  if(ST.settings.shuffleOptions)exOpts=shuffle(exOpts);
  exOpts.forEach(function(o){
    let s=sel.includes(o.key);
    let multi=q.isMultiple;
    html+='<div class="opt-item'+(multi?' multi':'')+(s?' selected':'')+'" data-key="'+o.key+'" tabindex="0" onclick="examToggle(\''+o.key+'\')">';
    html+='<div class="opt-check"><div class="opt-check-inner"></div></div>';
    html+='<span class="opt-key">'+o.key+'.</span>';
    html+='<span class="opt-text">'+h(oText(o))+'</span>';
    html+='</div>';
  });
  html+='</div>';

  html+='<div style="height:70px"></div>';

  $('#v-exam').innerHTML=html;

  // Render exam bottom bar into external container
  let ebar='<button class="btn btn-ghost" onclick="examPrev()"'+(examState.currentIndex<=0?' disabled':'')+'>'+ic('chevronL')+' \u4e0a\u4e00\u9898</button>';
  ebar+='<button class="btn btn-ghost" onclick="examFlag()" style="color:'+(isFlagged?'var(--warn)':'var(--tx3)')+'">'+ic('flag')+' '+(isFlagged?'\u5df2\u6807\u8bb0':'\u6807\u8bb0')+'</button>';
  ebar+='<button class="btn btn-ghost" onclick="examNext()"'+(examState.currentIndex>=examState.total-1?' disabled':'')+'>\u4e0b\u4e00\u9898 '+ic('chevronR')+'</button>';
  $('#examBar').innerHTML=ebar;
  $('#examBar').style.display='flex';
}

function examToggle(key){
  if(!examState)return;
  let qId=examState.questionIds[examState.currentIndex];
  let q=getQ(qId);if(!q)return;
  let sel=examState.answers[qId]?[...examState.answers[qId]]:[];
  if(q.isMultiple){
    let i=sel.indexOf(key);
    if(i>=0)sel.splice(i,1);else sel.push(key);
  }else{sel=[key];}
  examState.answers[qId]=sel;
  renderExamActive();
}

function examPrev(){if(examState&&examState.currentIndex>0){examState.currentIndex--;renderExamActive();}}
function examNext(){if(examState&&examState.currentIndex<examState.total-1){examState.currentIndex++;renderExamActive();}}
function jumpExam(i){if(examState){examState.currentIndex=i;examShowNav=false;renderExamActive();}}
function examFlag(){
  if(!examState)return;
  let qId=examState.questionIds[examState.currentIndex];
  if(examState.flagged.has(qId))examState.flagged.delete(qId);else examState.flagged.add(qId);
  renderExamActive();
}
function toggleExamNav(){examShowNav=!examShowNav;renderExamActive();}

function confirmFinish(){
  let unanswered=examState.questionIds.filter(function(id){return !examState.answers[id]||!examState.answers[id].length;}).length;
  let msg='\u786e\u5b9a\u8981\u63d0\u4ea4\u8003\u8bd5\u5417\uff1f';
  if(unanswered)msg+=' \u8fd8\u6709 '+unanswered+' \u9898\u672a\u7b54\u3002';
  showModal('\u63d0\u4ea4\u8003\u8bd5',msg,[
    {text:'\u53d6\u6d88',cls:'btn-out',action:hideModal},
    {text:'\u786e\u5b9a\u63d0\u4ea4',cls:'btn-err',action:function(){hideModal();finishExam();}}
  ]);
}

let examReviewBackTo=null; // 'exam' or 'profile'

function reviewExamHistory(idx){
  if(idx<0||idx>=ST.examHistory.length)return;
  examReview=ST.examHistory[idx];
  examReviewBackTo=curTab; // remember which tab we came from
  if(curTab!=='exam')switchTab('exam');

function renderExamResult(){

  html+='</div>';

  html+='<div class="result-stats">';

  html+='<div class="result-stat"><div class="val">'+fmtTime(r.timeUsed)+'</div><div class="lbl">\u7528\u65f6</div></div>';
  html+='<div class="result-stat"><div class="val">'+(r.total-r.score)+'</div><div class="lbl">\u9519\u9898</div></div>';
  html+='<div class="result-stat"><div class="val">'+(r.mode==='official'?'\u5b98\u65b9':'\u81ea\u5b9a\u4e49')+'</div><div class="lbl">\u6a21\u5f0f</div></div>';
  html+='</div>';

  // Trend chart
  if(ST.examHistory.length>1){
    html+='<div class="card"><div class="card-title">'+ic('trendUp')+' \u8d8b\u52bf\u56fe</div>';
    html+='<div class="chart-wrap"><canvas id="resultTrendChart"></canvas></div></div>';
  }

  // Per-question review
  let details=r.details||{};
  let dAnswers=details.answers||{};
  let dQids=details.questionIds||[];

  html+='<div class="card"><div class="card-title">'+ic('list')+' \u9898\u76ee\u56de\u987e</div>';
  dQids.forEach(function(id,i){

    html+='</div>';
  });
  html+='</div>';

  let backLabel=examReviewBackTo==='profile'?'\u8fd4\u56de\u6211\u7684':'\u8fd4\u56de\u8003\u8bd5\u8bbe\u7f6e';

  $('#v-exam').innerHTML=html;

/* ============================================================
   4. Wrong Answers
   ============================================================ */
function renderWrong(){
  let allW=ST.wrongIds;
  let unmastered=allW.filter(function(id){return !ST.masteredWrongIds.includes(id);});
  let mastered=allW.filter(function(id){return ST.masteredWrongIds.includes(id);});

  let html='<div class="fade-in">';
  html+='<h2 style="margin-bottom:12px;display:flex;align-items:center;gap:8px">'+ic('xCircle','icon-lg')+' \u9519\u9898\u672c</h2>';

  html+='<div class="wrong-filters">';
  html+='<div class="wrong-filter'+(wrongFilter==='all'?' active':'')+'" onclick="wrongFilter=\'all\';renderWrong()">\u5168\u90e8 ('+allW.length+')</div>';
  html+='<div class="wrong-filter'+(wrongFilter==='unmastered'?' active':'')+'" onclick="wrongFilter=\'unmastered\';renderWrong()">\u672a\u638c\u63e1 ('+unmastered.length+')</div>';
  html+='<div class="wrong-filter'+(wrongFilter==='mastered'?' active':'')+'" onclick="wrongFilter=\'mastered\';renderWrong()">\u5df2\u638c\u63e1 ('+mastered.length+')</div>';
  html+='</div>';

  let list=wrongFilter==='mastered'?mastered:wrongFilter==='unmastered'?unmastered:allW;

  if(!list.length){
    html+='<div class="empty-state">'+ic('checkCircle','icon-xl');
    html+='<p>\u6ca1\u6709\u9519\u9898'+(wrongFilter!=='all'?'\u5728\u8be5\u5206\u7c7b\u4e0b':'')+'</p></div>';
  }else{
    if(unmastered.length){
      html+='<button class="btn btn-pri btn-block" style="margin-bottom:12px" onclick="startPractice(\'wrong\')">'+ic('refresh','icon-sm')+' \u7ec3\u4e60\u9519\u9898 ('+unmastered.length+')</button>';
    }
    list.forEach(function(id){
      let q=getQ(id);if(!q)return;
      let a=ST.answers[id];
      let isMastered=ST.masteredWrongIds.includes(id);
      let review=ST.reviewSchedule[id];
      html+='<div class="wrong-card'+(isMastered?' mastered':'')+'" onclick="practiceSingleQ(\''+id+'\')">';
      html+='<div class="wc-id">'+h(q.id)+' '+typeBadge(q)+' '+(isMastered?'<span class="tag tag-easy">\u5df2\u638c\u63e1</span>':'')+'</div>';
      html+='<div class="wc-text">'+h(qText(q))+'</div>';
      html+='<div class="wc-meta">';
      html+='<span>'+ic('xCircle','icon-sm')+' '+(a?a.attempts:0)+'\u6b21</span>';
      html+='<span>'+ic('checkCircle','icon-sm')+' \u8fde\u5bf9: '+(a?a.correctStreak||0:0)+'</span>';
      if(review)html+='<span>'+ic('calendar','icon-sm')+' '+review.nextReview+'</span>';

    });

function doImport(e){
  let file=e.target.files[0];if(!file)return;
  let reader=new FileReader();
  reader.onload=function(ev){
    try{
      let data=JSON.parse(ev.target.result);
      if(data.version){
        ST=data;saveState();applyDarkMode();
        alert('\u5bfc\u5165\u6210\u529f!');
        renderProfile();
      }else{alert('\u65e0\u6548\u7684\u6587\u4ef6\u683c\u5f0f');}
    }catch(err){alert('\u5bfc\u5165\u5931\u8d25: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ============================================================
   Canvas Chart
   ============================================================ */
function drawExamChart(canvasId){
  let canvas=document.getElementById(canvasId);
  if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);

  let w=rect.width,ht=rect.height;
  let data=ST.examHistory.map(function(e){return pct(e.score,e.total);});
  if(data.length<1)return;

  let pad={t:24,r:24,b:32,l:44};
  let cw=w-pad.l-pad.r,ch=ht-pad.t-pad.b;

  let isDark=document.documentElement.classList.contains('dark');
  let txtColor=isDark?'#9CA3AF':'#6B7280';
  let gridColor=isDark?'#2a2a27':'#e8e6dc';

  ctx.clearRect(0,0,w,ht);

  // Grid
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    let y=pad.t+ch*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.fillStyle=txtColor;ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText((i*25)+'%',pad.l-6,y+4);
  }

  // 70% pass line
  let passY=pad.t+ch*(1-EXAM_CFG.passRate/100);
  ctx.strokeStyle='#c0392b';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pad.l,passY);ctx.lineTo(w-pad.r,passY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#c0392b';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText(EXAM_CFG.passRate+'%',w-pad.r+2,passY+3);

  if(data.length===1){
    // Single point
    let x=pad.l+cw/2,y=pad.t+ch*(1-data[0]/100);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=data[0]>=EXAM_CFG.passRate?'#788c5d':'#c0392b';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=txtColor;ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(data[0]+'%',x,y-10);
    ctx.fillText('#1',x,ht-pad.b+16);
    return;
  }

  let stepX=cw/(data.length-1);

  // Line
  ctx.strokeStyle='#d97757';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  data.forEach(function(v,i){
    let x=pad.l+i*stepX,y=pad.t+ch*(1-v/100);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Gradient fill
  ctx.beginPath();
  data.forEach(function(v,i){
    let x=pad.l+i*stepX,y=pad.t+ch*(1-v/100);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+(data.length-1)*stepX,pad.t+ch);
  ctx.lineTo(pad.l,pad.t+ch);
  ctx.closePath();
  let grd=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grd.addColorStop(0,'rgba(79,70,229,0.15)');
  grd.addColorStop(1,'rgba(79,70,229,0)');
  ctx.fillStyle=grd;ctx.fill();

  // Dots and labels
  data.forEach(function(v,i){
    let x=pad.l+i*stepX,y=pad.t+ch*(1-v/100);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=v>=EXAM_CFG.passRate?'#788c5d':'#c0392b';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=txtColor;ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(v+'%',x,y-10);
    ctx.fillText('#'+(i+1),x,ht-pad.b+16);
  });
}

function showModal(title,body,actions){
  let html='<div class="modal-title">'+title+'</div>';
  html+='<div class="modal-body">'+body+'</div>';
  html+='<div class="modal-actions">';
  actions.forEach(function(a,i){
    html+='<button class="btn '+a.cls+'" id="modalAct'+i+'">'+a.text+'</button>';
  });

  document.getElementById('modalInner').innerHTML=html;
  document.getElementById('modal').classList.add('show');
  actions.forEach(function(a,i){
    let btn=document.getElementById('modalAct'+i);
    if(btn)btn.onclick=a.action;
  });
}

}

  el.addEventListener('animationend',function(){el.classList.remove('kb-flash');},{once:true});
}

  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html+='<div style="font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px">'+ic('keyboard')+' \u952e\u76d8\u5feb\u6377\u952e</div>';
  html+='<button id="helpCloseBtn" class="btn btn-ghost btn-sm" aria-label="\u5173\u95ed">\u2715</button>';
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px">';
  let rows=[
    ['A\u2013G','\u9009\u62e9\u9009\u9879'],
    ['\u2191\u2193','\u79fb\u52a8\u9009\u9879\u7126\u70b9'],
    ['Enter','\u9009\u4e2d / \u63d0\u4ea4'],
    ['Space','\u9009\u4e2d\u7126\u70b9\u9009\u9879'],
    ['\u2190\u2192','\u4e0a / \u4e0b\u4e00\u9898'],
    ['F','\u5207\u6362\u6536\u85cf \u2605'],
    ['V','\u67e5\u770b\u89e3\u6790\uff08\u7b54\u9898\u540e\uff09'],
    ['Tab','\u987a\u5e8f\u5bfc\u822a'],
    ['Shift+Alt+H','\u6253\u5f00\u672c\u5e2e\u52a9'],
    ['Esc','\u5173\u95ed\u5e2e\u52a9'],
  ];
  rows.forEach(function(r){
    html+='<div class="shortcut-item"><span class="shortcut-key">'+r[0]+'</span> '+r[1]+'</div>';
  });
  html+='</div>';
  showModalRaw(html);
  let closeBtn=document.getElementById('helpCloseBtn');
  if(closeBtn){closeBtn.onclick=closeHelpModal;closeBtn.focus();}
  document.getElementById('modal').addEventListener('keydown',_helpTrap);
}

function closeHelpModal(){
  document.getElementById('modal').removeEventListener('keydown',_helpTrap);
  hideModal();
  if(_helpPrevFocus){try{_helpPrevFocus.focus();}catch(e){}}
  _helpPrevFocus=null;
}

function _helpTrap(e){
  if(e.key==='Escape'){closeHelpModal();e.preventDefault();return;}
  if(e.key!=='Tab')return;
  let inner=document.getElementById('modalInner');
  let focusable=[...inner.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"])')];
  if(!focusable.length)return;
  let first=focusable[0],last=focusable[focusable.length-1];
  if(e.shiftKey){if(document.activeElement===first){last.focus();e.preventDefault();}}
  else{if(document.activeElement===last){first.focus();e.preventDefault();}}
}

/* ============================================================
   Keyboard Shortcuts
   ============================================================ */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;

  // Shift+Alt+H: 打开帮助弹窗
  if(e.shiftKey&&e.altKey&&(e.code==='KeyH'||e.key.toUpperCase()==='H')){
    let modal=document.getElementById('modal');
    if(modal&&modal.classList.contains('show')){closeHelpModal();}
    else{showHelpModal();}
    e.preventDefault();return;
  }

  // Esc: 关闭弹窗并归还焦点
  if(e.key==='Escape'){
    let modal=document.getElementById('modal');
    if(modal&&modal.classList.contains('show')){closeHelpModal();e.preventDefault();return;}
  }

  // 通用：Enter/Space 激活 button-like div 元素
  if(e.key==='Enter'||e.key===' '){
    let el=document.activeElement;
    let btnDivClasses=['quick-btn','mode-card','btab','setup-card','bm-card','expl-toggle','notes-toggle'];
    if(el&&btnDivClasses.some(function(c){return el.classList.contains(c);})){
      el.click();e.preventDefault();return;
    }
  }

  let focusedOpt=document.activeElement&&document.activeElement.classList.contains('opt-item')?document.activeElement:null;

  // Practice mode
  if(practiceMode&&curTab==='practice'){
    let key=e.key.toUpperCase();

    // ↑/↓: 在选项间移动焦点
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      let opts=[...document.querySelectorAll('#v-practice .opt-item')];
      if(opts.length){
        let cur=opts.indexOf(document.activeElement);
        let next=e.key==='ArrowUp'
          ?(cur<=0?opts.length-1:cur-1)
          :(cur<0||cur>=opts.length-1?0:cur+1);
        opts[next].focus();
        opts[next].scrollIntoView({block:'nearest'});
        e.preventDefault();
      }
      return;
    }

    // Enter/Space: 选中已聚焦选项
    if((e.key==='Enter'||e.key===' ')&&focusedOpt&&!practiceSubmitted){
      let optEl=focusedOpt;
      toggleOption(optEl.dataset.key);
      flashEl(optEl);
      e.preventDefault();return;
    }

    // A-G: 直接选择选项（并闪烁对应 DOM 元素）
    if('ABCDEFG'.includes(key)){
      let q=getQ(practiceQs[practiceIdx]);
      if(q&&q.options.find(function(o){return o.key===key;})){
        toggleOption(key);
        let optEl=document.querySelector('#v-practice .opt-item[data-key="'+key+'"]');
        flashEl(optEl);
        e.preventDefault();return;
      }
    }

    // V: 切换解析（答题后）
    if(key==='V'&&practiceSubmitted){
      let exT=$('#v-practice .expl-toggle');
      toggleExpl();flashEl(exT);
      e.preventDefault();return;
    }

    // F: 切换收藏
    if(key==='F'){
      let qId=practiceQs[practiceIdx];
      if(qId){toggleBookmark(qId);e.preventDefault();return;}
    }

    // Enter: 提交答案（无焦点在选项上时）
    if(e.key==='Enter'&&!practiceSubmitted&&practiceSelected.length&&!focusedOpt){
      let btn=$('#v-practice .submit-btn');
      flashEl(btn);
      submitAnswer();
      e.preventDefault();return;
    }

    // ←/→: 上/下一题（并闪烁侧边按钮）
    if(e.key==='ArrowLeft'){
      flashEl($('.side-nav-prev'));
      prevQ();e.preventDefault();return;
    }
    if(e.key==='ArrowRight'){
      flashEl($('.side-nav-next'));
      nextQ();e.preventDefault();return;
    }
  }

  // Exam mode
  if(examActive&&curTab==='exam'){
    let key=e.key.toUpperCase();

    // ↑/↓: 在选项间移动焦点
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      let opts=[...document.querySelectorAll('#v-exam .opt-item')];
      if(opts.length){
        let cur=opts.indexOf(document.activeElement);
        let next=e.key==='ArrowUp'
          ?(cur<=0?opts.length-1:cur-1)
          :(cur<0||cur>=opts.length-1?0:cur+1);
        opts[next].focus();
        opts[next].scrollIntoView({block:'nearest'});
        e.preventDefault();
      }
      return;
    }

    // Enter/Space: 选中已聚焦选项
    if((e.key==='Enter'||e.key===' ')&&focusedOpt){
      let optEl=focusedOpt;
      examToggle(optEl.dataset.key);
      flashEl(optEl);
      e.preventDefault();return;
    }

    // A-G: 直接选择（并闪烁）
    if('ABCDEFG'.includes(key)){
      let qId=examState.questionIds[examState.currentIndex];
      let q=getQ(qId);
      if(q&&q.options.find(function(o){return o.key===key;})){
        examToggle(key);
        let optEl=document.querySelector('#v-exam .opt-item[data-key="'+key+'"]');
        flashEl(optEl);
        e.preventDefault();return;
      }
    }

    if(e.key==='ArrowLeft'){examPrev();e.preventDefault();return;}
    if(e.key==='ArrowRight'){examNext();e.preventDefault();}
  }
});

/* ============================================================
   Touch Swipe
   ============================================================ */
document.addEventListener('touchstart',function(e){
  touchStartX=e.changedTouches[0].screenX;
  touchStartY=e.changedTouches[0].screenY;
},{passive:true});

document.addEventListener('touchend',function(e){
  let dx=e.changedTouches[0].screenX-touchStartX;
  let dy=e.changedTouches[0].screenY-touchStartY;
  if(Math.abs(dx)<80||Math.abs(dy)>Math.abs(dx)*0.4)return;

  if(practiceMode&&curTab==='practice'){
    if(dx<0)nextQ();else prevQ();
  }
  if(examActive&&curTab==='exam'){
    if(dx<0)examNext();else examPrev();
  }
},{passive:true});

/* ============================================================
   Dark Mode Auto-Detect
   ============================================================ */
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){
    applyDarkMode();
  });
}

/* ============================================================
   Library Management
   ============================================================ */
const LIB_HISTORY_KEY='quiz_libraries';

function getLibHistory(){
  try{return JSON.parse(localStorage.getItem(LIB_HISTORY_KEY))||[];}catch(e){return[];}
}
function saveLibHistory(list){localStorage.setItem(LIB_HISTORY_KEY,JSON.stringify(list));}

function addLibToHistory(name,count,fileName){
  let list=getLibHistory();
  // Remove existing entry with same name
  list=list.filter(function(l){return l.name!==name;});
  list.unshift({name:name,count:count,fileName:fileName||'',lastUsed:new Date().toISOString()});
  if(list.length>10)list=list.slice(0,10);
  saveLibHistory(list);
}

function removeLibFromHistory(name){
  let list=getLibHistory().filter(function(l){return l.name!==name;});
  saveLibHistory(list);
  // Also remove its state
  let key=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_state';
  localStorage.removeItem(key);
  renderLibPicker();
}

function renderLibPicker(){
  let list=getLibHistory();
  let el=$('#libHistory');
  if(!list.length){el.innerHTML='';return;}
  let html='<div class="lib-history-title">\u6700\u8fd1\u4f7f\u7528</div>';
  list.forEach(function(lib){
    html+='<div class="lib-item" onclick="reloadLib(\''+h(lib.fileName||lib.name)+'\')">';
    html+='<div><div class="lib-item-name">'+h(lib.name)+'</div>';
    html+='<div class="lib-item-info">'+lib.count+' \u9898 \u00b7 '+new Date(lib.lastUsed).toLocaleDateString()+'</div></div>';
    html+='<div class="lib-item-right">';
    html+='<button class="lib-item-remove" onclick="event.stopPropagation();removeLibFromHistory(\''+h(lib.name)+'\')">'+ic('trash','icon-sm')+'</button>';
    html+='</div></div>';
  });
  el.innerHTML=html;
}

async function reloadLib(fileNameOrPath){
  try{
    let resp=await fetch('./'+fileNameOrPath);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    let data=await resp.json();
    if(!data.questions||!data.questions.length)throw new Error('Invalid format');
    bootApp(data,fileNameOrPath);
  }catch(e){
    alert('\u52a0\u8f7d\u5931\u8d25: '+e.message+'\n\u8bf7\u91cd\u65b0\u9009\u62e9\u6587\u4ef6\u3002');
  }
}

function loadLibFromFile(file){
  let reader=new FileReader();
  reader.onload=function(){
    try{
      let data=JSON.parse(reader.result);
      if(!data.questions||!data.questions.length)throw new Error('\u65e0\u6548\u7684\u9898\u5e93\u683c\u5f0f: \u7f3a\u5c11 questions \u6570\u7ec4');
      bootApp(data,file.name);
    }catch(e){
      alert('\u52a0\u8f7d\u5931\u8d25: '+e.message);
    }
  };
  reader.readAsText(file);
}

function bootApp(data,fileName){
  Q=data.questions||[];
  meta=data.meta||{};

  // Apply exam config
  LS_KEY=lsKey();
  EXAM_CFG.officialCount=meta.officialCount||Math.min(60,Q.length);
  EXAM_CFG.officialTime=meta.officialTime||105;
  EXAM_CFG.passRate=meta.passRate||70;
  EXAM_CFG.name=meta.exam||fileName.replace(/\.json$/i,'')||'Quiz';

  // Save to history
  addLibToHistory(examName(),Q.length,fileName);

  // Set page title and brand
  document.title=examName()+' \u9898\u5e93\u7ec3\u4e60';
  let bt=$('#brandTitle');if(bt)bt.textContent=examName();

  // Reset practice/exam state for new lib
  practiceMode=null;practiceQs=[];practiceIdx=0;
  examActive=false;examState=null;
  $('#practiceBar').style.display='none';
  $('#examBar').style.display='none';

  // Show app, hide picker
  $('#libPicker').style.display='none';
  $('#app').style.display='';
  $('#bottomtabs').style.display='';

  loadState();
  renderTabs();
  switchTab('dash');
}

function switchLibrary(){
  // Go back to picker
  $('#app').style.display='none';
  $('#bottomtabs').style.display='none';
  $('#practiceBar').style.display='none';
  $('#examBar').style.display='none';
  $('#libPicker').style.display='';
  if(examActive){clearInterval(examTimerInterval);examActive=false;examState=null;}
  practiceMode=null;
  renderLibPicker();
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  applyDarkMode();
  // Set up drop zone
  let dz=$('#dropZone');
  let fi=$('#libFileInput');
  dz.addEventListener('click',function(){fi.click();});
  fi.addEventListener('change',function(){if(fi.files.length)loadLibFromFile(fi.files[0]);fi.value='';});
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dragover');
    let f=e.dataTransfer.files;
    if(f.length&&f[0].name.endsWith('.json'))loadLibFromFile(f[0]);
    else alert('\u8bf7\u62d6\u5165 .json \u683c\u5f0f\u7684\u9898\u5e93\u6587\u4ef6');
  });
  // Try auto-load questions.json if it exists
  fetch('./questions.json').then(function(r){
    if(!r.ok)throw new Error();return r.json();
  }).then(function(data){
    if(data.questions&&data.questions.length){
      // Auto-load default questions.json
      bootApp(data,'questions.json');
    }
  }).catch(function(){
    // No default file, just show picker
  });
  renderLibPicker();
  // Hide app UI initially
  $('#bottomtabs').style.display='none';
}

init();
</script>
