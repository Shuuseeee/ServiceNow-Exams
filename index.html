<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>题库</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="theme-color" content="#4F46E5">
</head>
<body>
<!-- Top Nav desktop -->
<nav id="topnav">
  <div class="brand" id="brandTitle">Quiz</div>
  <div class="nav-tabs" id="desktopTabs"></div>
  <span id="syncStatus" style="margin-left:auto;font-size:.75rem;color:var(--tx3)"></span>
</nav>

<!-- Library Picker -->
<div id="libPicker">
  <h1>Quiz Bank</h1>
  <p class="subtitle"></p>
  <div style="margin-bottom:16px">
    <button id="libSignInBtn" class="btn btn-out btn-sm" style="display:none" onclick="window.showAuthModal&&window.showAuthModal()">登录同步</button>
  </div>
  <div class="drop-zone" id="dropZone">
    <div style="display:flex;flex-direction:column;align-items:center">
      <span class="icon" style="width:48px;height:48px;color:var(--tx3);margin-bottom:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
      <p id="dropZoneTitle" style="font-weight:600">点击选择或拖入题库文件</p>
      <p id="dropZoneHint" class="hint">支持 .json 格式的题库文件</p>
    </div>
    <input type="file" id="libFileInput" accept=".json" style="display:none">
  </div>
  <div class="lib-history" id="libHistory"></div>
</div>

<!-- App (hidden until library loaded) -->
<div id="app" style="display:none">
  <div id="v-dash" class="view"></div>
  <div id="v-practice" class="view"></div>
  <div id="v-exam" class="view"></div>
  <div id="v-wrong" class="view"></div>
  <div id="v-profile" class="view"></div>
</div>

<!-- Fixed bottom bars -->
<div id="practiceBar" class="q-bottom" style="display:none"></div>
<div id="examBar" class="exam-bottom" style="display:none"></div>

<!-- Bottom Tabs mobile -->
<div id="bottomtabs"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal"><div class="modal" id="modalInner"></div></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
